<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Visita al doctor 💊🏥</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6') no-repeat center center/cover;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* capa oscura elegante */
.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.55);
}

/* título */
.title {
  position: absolute;
  top: 20px;
  color: white;
  font-size: 32px;
  text-shadow: 0 0 15px pink;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px pink; }
  to { text-shadow: 0 0 25px white; }
}

/* contenedor del video */
.video-box {
  position: relative;
  width: 360px;
  height: 640px;
  border-radius: 20px;
  overflow: hidden;
  border: 3px solid rgba(255,255,255,0.6);
  box-shadow: 0 0 40px rgba(255, 105, 180, 0.5);
  z-index: 2;
  animation: float 4s ease-in-out infinite;
}

/* animación flotante */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* partículas rosas */
.petal {
  position: absolute;
  width: 15px;
  height: 15px;
  background: pink;
  border-radius: 50%;
  opacity: 0.7;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10%); opacity: 1; }
  100% { transform: translateY(110vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="title">Visita al doctor 💊🏥</div>

<div class="video-box">
  <video controls autoplay loop>
    <source src="https://raw.githubusercontent.com/Orlyk2/PioNach/c5395f5cbc7f84af494de8e3401e0eab97bb9089/1775773444805046.mp4" type="video/mp4">
  </video>
</div>

<script>
// pétalos animados
for(let i = 0; i < 25; i++){
  let petal = document.createElement("div");
  petal.classList.add("petal");
  petal.style.left = Math.random() * 100 + "vw";
  petal.style.animationDuration = (Math.random() * 5 + 3) + "s";
  document.body.appendChild(petal);
}
</script>

</body>
  </html>
