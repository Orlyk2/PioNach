<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visita al doctor 💊🏥</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  width: 100vw;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #3b0066, #12001f, #000);
  overflow: hidden;
  font-family: Arial, sans-serif;
}

/* título */
.title {
  position: absolute;
  top: 20px;
  color: #fff;
  font-size: 34px;
  font-weight: bold;
  text-shadow: 0 0 10px #fff, 0 0 25px #b56bff, 0 0 40px #ffcc00;
  animation: glowText 2s infinite alternate;
}

@keyframes glowText {
  from { filter: brightness(1); }
  to { filter: brightness(1.6); }
}

/* contenedor del video */
.video-container {
  width: 90vw;
  max-width: 420px;
  aspect-ratio: 9 / 16;
  position: relative;
  border-radius: 25px;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* marco dorado brillante */
.video-container::before {
  content: "";
  position: absolute;
  inset: -6px;
  border-radius: 30px;
  background: linear-gradient(45deg, gold, #fff3a0, gold, #ffcc00);
  background-size: 300% 300%;
  animation: borderGlow 4s linear infinite;
  z-index: 0;
  filter: blur(3px);
}

@keyframes borderGlow {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* video */
video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 22px;
  position: relative;
  z-index: 1;
}

/* brillo ambiental */
.glow {
  position: absolute;
  width: 120%;
  height: 120%;
  background: radial-gradient(circle, rgba(255,215,0,0.15), transparent 60%);
  filter: blur(40px);
  z-index: 0;
  animation: pulse 3s infinite alternate;
}

@keyframes pulse {
  from { opacity: 0.4; transform: scale(1); }
  to { opacity: 0.8; transform: scale(1.1); }
}
</style>
</head>

<body>

<div class="title">Visita al doctor 💊🏥</div>

<div class="video-container">
  <div class="glow"></div>
  <video controls autoplay loop>
    <source src="https://raw.githubusercontent.com/Orlyk2/PioNach/c5395f5cbc7f84af494de8e3401e0eab97bb9089/1775773444805046.mp4" type="video/mp4">
  </video>
</div>

</body>
</html>
